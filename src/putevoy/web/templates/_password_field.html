{# Партиал с макросом «поле пароля + глаз для показа/скрытия».
   Отдельный файл (без extends), чтобы login.html и register.html могли
   импортировать макрос без затягивания auth_layout/base.html в render-pipeline. #}
{% macro password_field(name, label, hint='', minlength=None) %}
<label class="block">
    <span class="text-xs block mb-1" style="color: var(--text-muted);">
        {{ label }}{% if hint %} <span style="color: var(--text-faded);">— {{ hint }}</span>{% endif %}
    </span>
    <div class="relative">
        <input type="password" name="{{ name }}" required
               {% if minlength %}minlength="{{ minlength }}"{% endif %}
               id="pwd-{{ name }}" class="w-full" style="padding-right: 38px;">
        <button type="button" class="pwd-toggle" data-target="pwd-{{ name }}"
                aria-label="Показать или скрыть пароль" tabindex="-1"
                style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
                       background: transparent; border: none; cursor: pointer; padding: 4px;
                       color: var(--text-muted); display: flex; align-items: center;">
            {# По дефолту пароль скрыт → показываем открытый глаз («нажми, чтобы показать») #}
            <svg class="pwd-eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            {# Когда пароль показан → зачёркнутый глаз («нажми, чтобы скрыть») #}
            <svg class="pwd-eye-closed hidden" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                <line x1="2" y1="2" x2="22" y2="22"></line>
            </svg>
        </button>
    </div>
</label>
{% endmacro %}
